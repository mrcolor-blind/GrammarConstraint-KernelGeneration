  <path d="M12 7L14 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="13.5" y="4.5" width="2" height="2" rx="0.3" stroke="currentColor" stroke-width="1" fill="none"/>
  <!-- Piernas robustas -->
